name: Pages Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Process
        env:
          AC8C54: ${{ secrets.AC8C54 }}
          B94C91: ${{ secrets.B94C91 }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" _site
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('AC8C54', '')
          sec_b = os.environ.get('B94C91', '')
          hits = 0
          for target in pathlib.Path('_site').rglob('*.html'):
              try:
                  before = target.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              after = before
              if sec_a:
                  after = after.replace('<!-- acd82ddc6fa112842951cee2 -->', sec_a)
              if sec_b:
                  after = after.replace('<!-- dff1ad3d7865a85c4dc44d6a5c -->', sec_b)
              if after != before:
                  target.write_text(after, encoding='utf-8')
                  hits += 1
          if hits == 0 and (sec_a or sec_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
